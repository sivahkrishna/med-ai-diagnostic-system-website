<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDI AI | Verify OTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1B3C53;
            --primary: #234C6A;
            --primary-light: #456882;
            --accent: #E3E3E3;
        }

        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 30%, var(--primary-light) 100%);
        }

        /* Preloader */
        .preloader {
            position: fixed;
            inset: 0;
            background: var(--primary-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .preloader.hidden { opacity: 0; visibility: hidden; }
        .preloader-circle {
            width: 80px;
            height: 80px;
            border: 4px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .preloader-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preloader-img {
            position: absolute;
            font-size: 1.5rem;
            color: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Background particles */
        .background-particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }

        .particle-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            right: -150px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Main content */
        main {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Form card - matching MEDI AI style */
        .form-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .form-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.4);
        }

        /* Icon */
        .form-title-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px -8px var(--primary-dark);
        }

        .form-title-icon i {
            font-size: 2.2rem;
            color: white;
        }

        /* Title */
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.95rem;
            margin-bottom: 2rem;
            color: var(--primary-light);
        }

        /* OTP Input Container */
        .otp-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 2rem;
        }

        /* OTP Input Fields - MEDI AI Styled */
        .otp-input {
            width: 70px;
            height: 80px;
            font-size: 2rem;
            font-weight: 700;
            border-radius: 16px;
            border: 2px solid var(--accent);
            text-align: center;
            transition: all 0.3s;
            background: #f8fafc;
            color: var(--primary-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(35, 76, 106, 0.1);
            transform: translateY(-2px);
        }

        .otp-input.filled {
            background: var(--accent);
            border-color: var(--primary-light);
            color: var(--primary-dark);
        }

        /* Button styles - matching MEDI AI */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            padding: 1rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(27,60,83,0.4);
        }

        /* Timer styling */
        .timer-container {
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem;
            background: var(--accent);
            border-radius: 12px;
        }

        .timer-label {
            font-size: 0.85rem;
            color: var(--primary-light);
            margin-right: 0.5rem;
        }

        .timer {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ef4444;
            display: inline-block;
        }

        /* Resend link */
        .resend-link {
            text-align: center;
            margin-top: 1rem;
        }

        .resend-link a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .resend-link a:hover {
            color: var(--primary);
        }

        /* Logo styling */
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 20;
        }

        .logo-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .logo-img:hover {
            transform: rotate(12deg);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: var(--accent);
        }

        /* Hidden OTP field */
        #otpFinal {
            display: none;
        }

        /* Fade in animation */
        .fade-in {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Info text */
        .info-text {
            text-align: center;
            color: var(--primary-light);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.6;
            background: var(--accent);
            padding: 0.75rem 1rem;
            border-radius: 12px;
        }
        .info-text i {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-inner">
            <div class="preloader-circle"></div>
            <div class="preloader-img">
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
    </div>

    <!-- Background Particles -->
    <div class="background-particles">
        <div class="particle particle-1"></div>
        <div class="particle particle-2"></div>
    </div>

    <!-- MEDI AI Logo -->
    <div class="logo-container">
        <img src="{% static 'images/IMG_7705.PNG' %}" alt="MEDI AI Logo" class="logo-img">
        <div class="logo-text">
            MEDI <span>AI</span>
        </div>
    </div>

    <main>
        <div class="container mx-auto px-4">
            <div class="form-card fade-in">
                <!-- Icon -->
                <div class="form-title-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>

                <!-- Title -->
                <h1 class="font-bold text-center">Verify OTP</h1>
                <p class="text-center subtitle">Enter the code sent to your email</p>

                <!-- Info Text -->
                <div class="info-text">
                    <i class="fas fa-envelope mr-2"></i>
                    We've sent a 4-digit code to your email address
                </div>

                <!-- Form -->
                <form method="post" action="/otpbuttonclick" id="otpForm">
                    {% csrf_token %}

                    <!-- OTP Input Fields -->
                    <div class="otp-wrapper">
                        <input class="otp-input" type="text" maxlength="1" id="otp1" inputmode="numeric" pattern="[0-9]" title="Enter a digit">
                        <input class="otp-input" type="text" maxlength="1" id="otp2" inputmode="numeric" pattern="[0-9]" title="Enter a digit">
                        <input class="otp-input" type="text" maxlength="1" id="otp3" inputmode="numeric" pattern="[0-9]" title="Enter a digit">
                        <input class="otp-input" type="text" maxlength="1" id="otp4" inputmode="numeric" pattern="[0-9]" title="Enter a digit">
                    </div>

                    <!-- Hidden field to store complete OTP -->
                    <input type="hidden" name="textfield" id="otpFinal">

                    <!-- Verify Button -->
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-check-circle"></i>
                        Verify Code
                    </button>

                    <!-- Timer and Resend -->
                    <div class="timer-container">
                        <span class="timer-label">
                            <i class="fas fa-hourglass-half mr-1"></i>
                            Code expires in:
                        </span>
                        <span class="timer" id="timer">02:00</span>
                    </div>

                    <div class="resend-link">
                        <a href="/forgotpassword">
                            <i class="fas fa-redo-alt"></i>
                            Resend OTP
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Preloader
        window.addEventListener('load', function() {
            setTimeout(function() {
                var preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.classList.add('hidden');
                }
            }, 800);
        });

        // Disable scrolling
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.body.addEventListener('wheel', function(e) {
            e.preventDefault();
        }, { passive: false });

        // OTP Input Handling
        const inputs = document.querySelectorAll(".otp-input");

        // Allow only numbers
        inputs.forEach(input => {
            input.addEventListener("keypress", (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        inputs.forEach((input, index) => {
            input.addEventListener("keyup", (e) => {
                if (e.key >= "0" && e.key <= "9") {
                    input.classList.add("filled");
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                } else if (e.key === "Backspace") {
                    input.classList.remove("filled");
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
                collectOTP();
            });

            // Handle paste event
            input.addEventListener("paste", (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 4);

                for (let i = 0; i < pasteData.length; i++) {
                    if (inputs[i]) {
                        inputs[i].value = pasteData[i];
                        inputs[i].classList.add("filled");
                    }
                }

                if (pasteData.length === 4) {
                    inputs[3].focus();
                } else if (pasteData.length > 0) {
                    inputs[pasteData.length].focus();
                }

                collectOTP();
            });
        });

        function collectOTP() {
            let value = "";
            inputs.forEach(input => value += input.value);
            document.getElementById("otpFinal").value = value;
        }

        // Timer with redirect
        let timeLeft = 120;  // 2 minutes
        const timerDisplay = document.getElementById("timer");

        const countdown = setInterval(() => {
            let m = String(Math.floor(timeLeft / 60)).padStart(2, "0");
            let s = String(timeLeft % 60).padStart(2, "0");
            timerDisplay.textContent = `${m}:${s}`;

            // Change color when less than 30 seconds
            if (timeLeft <= 30) {
                timerDisplay.style.color = '#ef4444';
                timerDisplay.style.fontWeight = '800';
            }

            timeLeft--;

            if (timeLeft < 0) {
                clearInterval(countdown);
                timerDisplay.textContent = "00:00";
                // Optional: auto redirect
                // window.location.href = "/forgotpassword";
            }
        }, 1000);

        // Form validation
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            const otpValue = document.getElementById('otpFinal').value;

            if (otpValue.length !== 4) {
                e.preventDefault();
                alert('Please enter all 4 digits of the OTP');

                // Focus first empty field
                for (let i = 0; i < inputs.length; i++) {
                    if (!inputs[i].value) {
                        inputs[i].focus();
                        break;
                    }
                }
            }
        });

        // Auto-focus first input
        document.getElementById('otp1').focus();
    </script>
</body>
</html>
